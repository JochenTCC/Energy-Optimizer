# Synology Container Manager – Produktions-Compose (vorgefertigtes Image)
#
# Voraussetzungen im Projektordner auf der NAS:
#   - .env (LOXONE_IP, LOXONE_USER, LOXONE_PASS)
#   - config.json (aus config.example.json, Laufzeit-Parameter + flexible_consumers)
#   - cons_data_hourly.csv (+ .meta.json) – einmalig lokal via scripts/generate_cons_data.py erzeugen,
#     danach auf die NAS kopieren; laufende Pflege erfolgt über main.py
#   - Leere Dateien anlegen, falls noch nicht vorhanden (Synology legt sonst Ordner an):
#       touch flexible_consumers_state.json pv_counter_state.json cons_data_pending.json
#       touch pv_accuracy_log.csv system_history_log.csv energy_optimizer.log
#       touch consumption_profiles.csv total_consumption_profiles.csv flexible_consumer_profiles.csv
#   - Laufzeit-Ordner für run_state (kein Einzeldatei-Mount – Synology EBUSY):
#       mkdir -p runtime
#
# Nicht benötigt in Prod (nur Dev/Forschung): Loxone-Historien-CSVs, backtesting_log.json
#
# Nach Änderungen an config.json: Container optimizer-worker neu starten (lädt Config nur beim Start).
# UI: ENERGY_OPTIMIZER_UI_MODES=live (nur Echtzeit); Dev ohne Variable = alle Modi.

version: "3.8"

x-persist-volumes: &persist-volumes
  # Konfiguration
  - ./.env:/app/.env
  - ./config.json:/app/config.json
  # Laufzeit-Zustand
  - ./flexible_consumers_state.json:/app/flexible_consumers_state.json
  - ./pv_counter_state.json:/app/pv_counter_state.json
  - ./cons_data_pending.json:/app/cons_data_pending.json
  - ./runtime:/app/runtime
  # Stunden-Log (Profile + Tagesziele; wird von main.py fortgeschrieben)
  - ./cons_data_hourly.csv:/app/cons_data_hourly.csv
  - ./cons_data_hourly.meta.json:/app/cons_data_hourly.meta.json
  # Verbrauchsprofile (monatlich aus cons_data neu berechnet)
  - ./consumption_profiles.csv:/app/consumption_profiles.csv
  - ./total_consumption_profiles.csv:/app/total_consumption_profiles.csv
  - ./flexible_consumer_profiles.csv:/app/flexible_consumer_profiles.csv
  # Logs
  - ./pv_accuracy_log.csv:/app/pv_accuracy_log.csv
  - ./system_history_log.csv:/app/system_history_log.csv
  - ./energy_optimizer.log:/app/energy_optimizer.log

services:
  optimizer-worker:
    image: ghcr.io/jochentcc/ernie-energy:latest
    container_name: ernie-optimizer-worker
    command: python main.py
    restart: unless-stopped
    volumes: *persist-volumes
    environment:
      - TZ=Europe/Vienna

  optimizer-ui:
    image: ghcr.io/jochentcc/ernie-energy:latest
    container_name: ernie-optimizer-ui
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes: *persist-volumes
    environment:
      - TZ=Europe/Vienna
      - ENERGY_OPTIMIZER_UI_MODES=live
