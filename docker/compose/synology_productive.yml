# Synology Container Manager – Produktions-Compose (vorgefertigtes Image :latest)
#
# Persistente Daten (überleben Image-Updates):
#   ./earnie_env/config/config.json   – Haus-Konfiguration (wird nie überschrieben)
#   ./earnie_env/config/tariffs.json  – Tarif-Katalog (Sidecar; wird nie überschrieben)
#   ./earnie_env/config/backtesting_scenarios.json, house_profiles.json – weitere Sidecars
#   ./earnie_env/config/.env          – Loxone-Zugangsdaten
#   ./earnie_env/runtime/  – cons_data, Zustands-JSONs, Profile, Logs
#
# Erstinstallation:
#   1. Ordner anlegen: mkdir -p earnie_env/config earnie_env/runtime
#   2. Container starten – fehlende Dateien legt der Entrypoint an (config/.env, config.json)
#   3. config/.env und earnie_env/config/config.json anpassen (Loxone-Zugang, Namen, Verbraucher)
#   4. Optional: bestehende cons_data nach runtime/cons_data_hourly.csv kopieren
#
# Migration vom alten Dateinamen synology.yml / Container „earnie“:
#   docker stop earnie; docker rm earnie
#   dann diese Datei als compose.yaml nutzen und up -d (neuer Name: earnie-productive)
#
# Ein Container: Streamlit-UI startet main.py automatisch (EARNIE_AUTO_START_MAIN=1).
# Nach Änderungen an earnie_env/config/config.json: Container neu starten.
# Nach Code-Änderungen: Image bauen/pushen (docs/einrichtung/container.md), dann auf der NAS:
#   docker compose --project-directory . -f docker/compose/synology_productive.yml pull
#   docker compose --project-directory . -f docker/compose/synology_productive.yml up -d
#
# Community Pre-release parallel: docker/compose/synology-alpha.yml (Port 8511, earnie_env_alpha/).
#
# Auf der NAS liegt die Datei oft als compose.yaml — Inhalt aus diesem File übernehmen.
#
# UI: EARNIE_UI_MODES=sunset2sunset,scenario_explorer,live_environment (Prod); Dev ohne Variable = Standard-Modi.

name: earnie-productive

version: "3.8"

x-persist-volumes: &persist-volumes
  - ./earnie_env/config:/app/config
  - ./earnie_env/runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  EARNIE_CONFIG_PATH: config
  # Tarif-Plausibilität beim main.py-Start; siehe scripts/startup_checks.py
  EARNIE_STRICT_TARIFF_VALIDATE: "1"
  # Loxone-Smoke-Test beim main.py-Start (nach pull/up); siehe scripts/startup_checks.py
  EARNIE_VERIFY_LOXONE_ON_START: "1"
  EARNIE_AUTO_START_MAIN: "1"

services:
  earnie-productive:
    image: ghcr.io/jochentcc/earnie-energy:latest
    container_name: earnie-productive
    command: >
      python -m scripts.run_streamlit
      --
      --server.port 8501
      --server.address 0.0.0.0
      --server.enableCORS false
      --server.enableXsrfProtection false
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
      EARNIE_UI_MODES: sunset2sunset,live_environment
      EARNIE_UI_CHART_DEBUG_CAPTURE_ENABLED: "1"
