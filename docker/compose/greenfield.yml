# Greenfield Dev-Stack (1.24.c) — Ersteinrichtung auf leerem config/ + runtime/
#
# Abnahme-Infrastruktur für Hauskonfigurator und Backtesting ohne produktive Loxone-Anbindung.
# Getrennt vom lokalen Dev-Stack (docker/compose/dev.yml) und von Silent/Simuliert (Backlog 7g).
#
# Erststart:
#   mkdir greenfield\config greenfield\runtime
#   docker compose --project-directory . -f docker/compose/greenfield.yml up -d --build
#
# UI: http://localhost:8502 — Ersteinrichtung (setup_dotenv), Sunset-2-Sunset + Backtesting (1.26.0 P0).
# Checkliste: docs/einrichtung/greenfield-dev-stack.md
#
# Ein Container: Streamlit-UI startet main.py automatisch (EARNIE_AUTO_START_MAIN=1).
# Stack stoppen (Daten bleiben in greenfield/):
#   docker compose --project-directory . -f docker/compose/greenfield.yml down

version: "3.8"

x-persist-volumes: &persist-volumes
  - ./greenfield/config:/app/config
  - ./greenfield/runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  EARNIE_CONFIG_PATH: config
  # Volume is ./greenfield/runtime:/app/runtime — must match writers (not baked earnie_env/runtime).
  EARNIE_RUNTIME_PATH: runtime
  # Kein Loxone-Smoke-Test — Greenfield nutzt Dummy-Zugangsdaten aus der Ersteinrichtung.
  EARNIE_VERIFY_LOXONE_ON_START: "0"
  EARNIE_AUTO_START_MAIN: "1"

x-build: &build
  context: .
  dockerfile: docker/Dockerfile

services:
  earnie:
    build: *build
    container_name: earnie-greenfield
    restart: unless-stopped
    ports:
      - "8502:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
      EARNIE_UI_MODES: sunset2sunset,scenario_explorer,live_environment
