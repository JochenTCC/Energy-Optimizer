# Proxmox LXC (amd64) – Produktions-Compose (vorgefertigtes Multi-Arch-Image :latest)
#
# Läuft in einem LXC-Container mit Docker (nesting=1). Siehe docs/einrichtung/proxmox-lxc.md
# und docker/proxmox/ (LXC-Beispielkonfig + Bootstrap).
#
# Persistente Daten (überleben Image-Updates):
#   ./earnie_env/config/config.json   – Haus-Konfiguration (wird nie überschrieben)
#   ./earnie_env/config/tariffs.json  – Tarif-Katalog (Sidecar; wird nie überschrieben)
#   ./earnie_env/config/backtesting_scenarios.json, house_profiles.json – weitere Sidecars
#   ./earnie_env/config/.env          – Loxone-Zugangsdaten
#   ./earnie_env/runtime/  – cons_data, Zustands-JSONs, Profile, Logs
#
# Erstinstallation (typisch /opt/earnie/ im LXC):
#   1. Ordner anlegen: mkdir -p earnie_env/config earnie_env/runtime
#   2. Diese Datei als compose.yaml ablegen (oder -f docker/compose/proxmox_productive.yml)
#   3. Container starten – fehlende Dateien legt der Entrypoint an
#   4. config/.env und earnie_env/config/config.json anpassen (Loxone-Zugang, Namen, Verbraucher)
#   5. Optional: bestehende cons_data nach runtime/cons_data_hourly.csv kopieren
#
# Migration vom alten Dateinamen proxmox.yml / Container „earnie“:
#   docker stop earnie; docker rm earnie
#   dann up -d mit dieser Datei (neuer Name: earnie-productive)
#
# Ein Container: Streamlit-UI startet main.py automatisch (EARNIE_AUTO_START_MAIN=1).
# Nach Änderungen an earnie_env/config/config.json: Container neu starten.
# Nach Code-Änderungen: Image pullen, dann:
#   docker compose --project-directory . -f docker/compose/proxmox_productive.yml pull
#   docker compose --project-directory . -f docker/compose/proxmox_productive.yml up -d
#
# Community Pre-release parallel: docker/compose/proxmox-alpha.yml (Port 8511, earnie_env_alpha/).
#
# UI im LAN: http://<lxc-ip>:8501 (extern nur mit eigenem Proxy/VPN).

name: earnie-productive

version: "3.8"

x-persist-volumes: &persist-volumes
  - ./earnie_env/config:/app/config
  - ./earnie_env/runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  EARNIE_CONFIG_PATH: config
  # Volume is ./earnie_env/runtime:/app/runtime — must match writers (not baked earnie_env/runtime).
  EARNIE_RUNTIME_PATH: runtime
  EARNIE_STRICT_TARIFF_VALIDATE: "1"
  # Loxone-Smoke-Test beim main.py-Start (nach pull/up); siehe scripts/startup_checks.py
  EARNIE_VERIFY_LOXONE_ON_START: "1"
  EARNIE_AUTO_START_MAIN: "1"

services:
  earnie-productive:
    image: ghcr.io/jochentcc/earnie-energy:latest
    container_name: earnie-productive
    command: >
      python -m scripts.run_streamlit
      --
      --server.enableCORS false
      --server.enableXsrfProtection false
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
      EARNIE_UI_MODES: sunset2sunset,live_environment
