# Proxmox LXC (amd64) – Alpha / Community Pre-release
#
# Parallel zu Produktion (docker/compose/proxmox_productive.yml):
#   - Host-Port 8511 (Prod bleibt 8501)
#   - Eigene Volumes unter ./earnie_env_alpha/
#   - Image-Tag pinnen (kein :latest) — an version.py / GitHub Pre-release anpassen
#
# Warnung: Nicht zwei Daemonen mit Schreibzugriff auf denselben Miniserver laufen lassen,
# ohne Silent-Mode / klare Absprache.
#
# Start (typisch /opt/earnie/ im LXC):
#   mkdir -p earnie_env_alpha/config earnie_env_alpha/runtime
#   docker compose --project-directory . -f docker/compose/proxmox-alpha.yml pull
#   docker compose --project-directory . -f docker/compose/proxmox-alpha.yml up -d
#
# UI: http://<lxc-ip>:8511
# Ports: docs/referenz/streamlit-ports.md · LXC: docs/einrichtung/proxmox-lxc.md

name: earnie-alpha

version: "3.8"

x-persist-volumes: &persist-volumes
  - ./earnie_env/config:/app/config
  - ./earnie_env/runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  EARNIE_CONFIG_PATH: config
  # Volume is ./…/runtime:/app/runtime — must match writers (not baked earnie_env/runtime).
  EARNIE_RUNTIME_PATH: runtime
  EARNIE_STRICT_TARIFF_VALIDATE: "1"
  EARNIE_VERIFY_LOXONE_ON_START: "1"
  EARNIE_AUTO_START_MAIN: "1"

services:
  earnie-alpha:
    # Pre-release only — bump when a new alpha/rc is published (matches version.py).
    image: ghcr.io/jochentcc/earnie-energy:2.2.0-alpha.7
    container_name: earnie-alpha
    command: >
      python -m scripts.run_streamlit
      --
      --server.enableCORS false
      --server.enableXsrfProtection false
    restart: unless-stopped
    ports:
      - "8511:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
      EARNIE_UI_MODES: sunset2sunset,live_environment
