# Lokaler Dev-Stack — Build aus Repo-Root:
#   docker compose --project-directory . -f docker/compose/dev.yml up -d --build
#
# Ein Container: Streamlit + auto-start von main.py (EARNIE_AUTO_START_MAIN=1).
# Nach Änderungen an earnie_env/config/config.json: Container neu starten.
version: '3.8'

x-persist-volumes: &persist-volumes
  - ./earnie_env/config:/app/config
  - ./earnie_env/runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  EARNIE_CONFIG_PATH: config
  EARNIE_VERIFY_LOXONE_ON_START: "1"
  EARNIE_AUTO_START_MAIN: "1"

x-build: &build
  context: .
  dockerfile: docker/Dockerfile

services:
  earnie:
    build: *build
    container_name: earnie
    restart: unless-stopped
    # Host 8521 → Container 8501 (ui.streamlit_port im Container bleibt 8501).
    ports:
      - "8521:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
