version: '3.8'

x-persist-volumes: &persist-volumes
  - ./config:/app/config
  - ./runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  ENERGY_OPTIMIZER_CONFIG_PATH: config/config.json
  ENERGY_OPTIMIZER_VERIFY_LOXONE_ON_START: "1"

services:
  optimizer-worker:
    build: .
    container_name: ernie-optimizer-worker
    command: python main.py
    restart: unless-stopped
    volumes: *persist-volumes
    environment:
      <<: *common-env

  optimizer-ui:
    build: .
    container_name: ernie-optimizer-ui
    command: python -m scripts.run_streamlit
    restart: unless-stopped
    # Host-Port muss ui.streamlit_port in config/config.json entsprechen (Standard: 8501).
    ports:
      - "8501:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
