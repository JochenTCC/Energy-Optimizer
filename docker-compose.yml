version: '3.8'

x-persist-volumes: &persist-volumes
  - ./.env:/app/.env
  - ./config:/app/config
  - ./runtime:/app/runtime

x-common-env: &common-env
  TZ: Europe/Vienna
  ENERGY_OPTIMIZER_CONFIG_PATH: config/config.json
  ENERGY_OPTIMIZER_VERIFY_LOXONE_ON_START: "1"

services:
  optimizer-worker:
    build: .
    container_name: ernie-optimizer-worker
    command: python main.py
    restart: unless-stopped
    volumes: *persist-volumes
    environment:
      <<: *common-env

  optimizer-ui:
    build: .
    container_name: ernie-optimizer-ui
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes: *persist-volumes
    environment:
      <<: *common-env
