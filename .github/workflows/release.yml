# Tag-triggered release: multi-arch Docker → ghcr.io + GitHub Release.
# Trigger: push annotated tag matching vMAJOR.MINOR.PATCH or SemVer pre-release
#   (e.g. v2.0.0, v2.2.0-alpha.1).
# Prerequisite: version.py __version__ must equal the tag without the leading "v".
# Pre-releases (version contains "-"): GitHub --prerelease, no --latest, no Docker :latest.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Version gate (tag must match version.py)
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="${TAG#v}"
          ACTUAL="$(python -c 'from version import __version__; print(__version__)')"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::version.py is '${ACTUAL}' but tag is '${TAG}' (expected '${EXPECTED}')"
            exit 1
          fi
          if [[ "$ACTUAL" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "version=${ACTUAL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Version gate OK: ${ACTUAL} (prerelease=${PRERELEASE})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # Existing user packages often deny GITHUB_TOKEN write unless the package
          # grants this repo Write under "Manage Actions access". Prefer a PAT
          # (write:packages) stored as repo secret GHCR_TOKEN.
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        run: python -m scripts.build_container --target all --push
        # Tariff deploy-gate runs inside build_container when --push is set.
        # default_tags() omits :latest when version.py is a SemVer pre-release.

      - name: Prepare release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          OUT="${RUNNER_TEMP}/release-notes.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" "$OUT"
          else
            {
              echo "## Earnie ${VERSION}"
              echo ""
              if [ "$PRERELEASE" = "true" ]; then
                echo "### Pre-release (community test)"
                echo ""
                echo "This is **not** an official release. Do not use \`:latest\` — pin the version tag."
                echo ""
                echo "### Docker images"
                echo ""
                echo "- \`ghcr.io/jochentcc/earnie-energy:${VERSION}\`"
                echo "- Legacy alias: \`ghcr.io/jochentcc/ernie-energy:${VERSION}\`"
              else
                echo "### Docker images"
                echo ""
                echo "- \`ghcr.io/jochentcc/earnie-energy:${VERSION}\`"
                echo "- \`ghcr.io/jochentcc/earnie-energy:latest\`"
                echo "- Legacy aliases: \`ghcr.io/jochentcc/ernie-energy:${VERSION}\` / \`:latest\`"
              fi
              echo ""
              echo "Deploy: [docs/einrichtung/container.md](https://github.com/${{ github.repository }}/blob/main/docs/einrichtung/container.md)"
              echo ""
              echo "Multi-arch: \`linux/amd64\` (Synology / Proxmox) · \`linux/arm64\` (LoxBerry)."
            } > "$OUT"
          fi
          echo "path=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARGS=(
            "${{ steps.version.outputs.tag }}"
            --title "Earnie ${{ steps.version.outputs.version }}"
            --notes-file "${{ steps.notes.outputs.path }}"
          )
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            ARGS+=(--prerelease)
          else
            ARGS+=(--latest)
          fi
          gh release create "${ARGS[@]}"
